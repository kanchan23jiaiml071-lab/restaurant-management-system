<!DOCTYPE html>
<html>
<head>
  <title>Reception - Order System</title>
</head>
<body>

<h2>Restaurant Order</h2>

<input type="text" id="name" placeholder="Customer Name"><br><br>
<input type="text" id="phone" placeholder="Phone"><br><br>

<select id="item">
  <option>Pizza</option>
  <option>Burger</option>
  <option>Tea</option>
</select><br><br>

<input type="number" id="quantity" placeholder="Quantity"><br><br>

<select id="parcel">
  <option value="yes">Parcel</option>
  <option value="no">Dine-in</option>
</select><br><br>

<button onclick="addOrder()">Add Order</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // 🔥 YOUR FIREBASE CONFIG (PUT YOUR OWN HERE)
  const firebaseConfig = {
    apiKey: "AIzaSyBXO601I83qFbsifbo_QE09iMfxaED6FNg",
    authDomain: "restaurant-order.firebaseapp.com",
    projectId: "restaurant-order",
    storageBucket: "restaurant-order.appspot.com",
    messagingSenderId: "30135191529",
    appId: "1:30135191529:web:6707f116553533af5cad78"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.addOrder = async function () {
    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;
    const item = document.getElementById("item").value;
    const quantity = document.getElementById("quantity").value;
    const parcel = document.getElementById("parcel").value;

    try {
      await addDoc(collection(db, "orders"), {
        name: name,
        phone: phone,
        item: item,
        quantity: Number(quantity),
        parcel: parcel,
        status: "pending",
        time: new Date().toLocaleString()
      });

      alert("✅ Order Added Successfully");

    } catch (e) {
      console.error("Error:", e);
      alert("❌ Error adding order");
    }
  }
</script>

</body>
</html>
